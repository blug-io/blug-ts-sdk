name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      current_version: ${{ steps.check.outputs.current_version }}
      previous_version: ${{ steps.check.outputs.previous_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check package version change
        id: check
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIOUS_PACKAGE_JSON=$(git show HEAD^:package.json 2>/dev/null || true)
          PREVIOUS_VERSION=$(printf "%s" "$PREVIOUS_PACKAGE_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).version||'')}catch{console.log('')}})")

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: detect-version-change
    if: github.event_name == 'workflow_dispatch' || needs.detect-version-change.outputs.should_publish == 'true'

    steps:
      - name: Restrict manual dispatch to maintainers
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const username = context.actor;
            const permission = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username,
            });
            const role = permission.data.role_name;
            core.info(`Manual dispatch by ${username} with role: ${role}`);
            if (!['maintain', 'admin'].includes(role)) {
              core.setFailed(`workflow_dispatch is limited to maintainers/admins. Actor '${username}' has role '${role}'.`);
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate quality gates
        run: |
          bun run biome:ci
          bun run test

      - name: Build package
        run: bun run build

      - name: Publish package
        run: bun publish --access public --auth-type legacy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
